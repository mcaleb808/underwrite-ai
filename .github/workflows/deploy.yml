name: Deploy api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  prereq:
    name: Check deploy is configured
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          if [ -n "$WIF" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "GCP_WORKLOAD_IDENTITY_PROVIDER is not set — deploy will skip until terraform apply has run and the GCP_* secrets are populated. See infra/README.md."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Build + push + roll Cloud Run
    needs: prereq
    if: needs.prereq.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          IMAGE: ${{ secrets.GCP_ARTIFACT_REPO }}/api
        run: |
          docker build \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            apps/api
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ secrets.GCP_CLOUD_RUN_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --image "${{ secrets.GCP_ARTIFACT_REPO }}/api:${{ github.sha }}" \
            --quiet

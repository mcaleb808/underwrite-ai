name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  prereq:
    name: Check deploy is configured
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "VERCEL_TOKEN is not set — deploy will skip until VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID are populated."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Pull + build + deploy to Vercel
    needs: prereq
    if: needs.prereq.outputs.ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --scope=chui --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt
        run: vercel deploy --prebuilt --prod --scope=chui --token=${{ secrets.VERCEL_TOKEN }}
